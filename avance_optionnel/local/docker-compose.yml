# =============================================================================
# OPTIONNEL — Airflow local (un seul conteneur) pour visualiser le DAG.
# Lancement :  cd local && docker compose up
# Puis ouvrir http://localhost:8080  (identifiants affichés dans les logs : admin / <mot de passe>)
#
# Le chemin local le plus simple reste : python run_local_pipeline.py
# (Airflow sert surtout à produire la capture "graph view" pour le rapport/la vidéo.)
# =============================================================================
services:
  airflow:
    image: apache/airflow:2.9.3-python3.11
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # Dépendances de la pipeline installées au démarrage du conteneur
      _PIP_ADDITIONAL_REQUIREMENTS: "duckdb pandas pyarrow scikit-learn requests python-dotenv"
    volumes:
      - ../orchestration/airflow/dags:/opt/airflow/dags
      - ..:/opt/project            # monte tout le projet sous /opt/project
    command: standalone
